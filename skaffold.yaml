apiVersion: skaffold/v4beta14
kind: Config
metadata:
  name: rootenv
build:
  local:
    push: false
    useDockerCLI: true
  artifacts:
    - image: rootenv-backend
      context: services/backend
      docker:
        dockerfile: Dockerfile
      sync:
        manual:
          - src: 'pb_hooks/*.pb.js'
            dest: '/app/pb_hooks'
        hooks:
          after:
            - container:
                command: ["sh", "-c", "kill -HUP 1"]
    - image: rootenv-frontend
      context: services/frontend
      docker:
        dockerfile: Dockerfile.dev
      sync:
        manual:
          - src: 'src/**'
            dest: '/app'
          - src: 'public/**'
            dest: '/app'
          - src: 'index.html'
            dest: '/app'
    - image: labenv-operator
      context: services/labenv-operator
      docker:
        dockerfile: Dockerfile
    - image: attempt-controller
      context: services/attempt-controller
      docker:
        dockerfile: Dockerfile
    - image: relay-exec
      context: services/relay
      docker:
        dockerfile: cmd/relay-exec/Dockerfile
deploy:
  kubectl: {}
  kubeContext: k3d-rootenv
manifests:
  kustomize:
    paths:
    - deploy/overlays/dev