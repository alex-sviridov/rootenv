apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: backend
  name: backend
  namespace: rootenv-infra
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend
  strategy: {}
  template:
    metadata:
      labels:
        app: backend
    spec:
      volumes:
        - name: pb-storage
          persistentVolumeClaim:
            claimName: backend-pb-data-pvc
      containers:
      - name: backend
        image: docker.io/library/rootenv-backend
        ports:
        - containerPort: 8090
        volumeMounts:
        - name: pb-storage
          mountPath: /app/pb_data
        env:
        - name: PB_ORIGINS
          value: "*"
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "128Mi"
            cpu: "500m"
status: {}
