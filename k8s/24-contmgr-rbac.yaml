---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: contmgr
  namespace: rootenv-users
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch", "create", "delete"]
  - apiGroups: [""]
    resources: ["pods/exec"]
    verbs: ["create"]
  - apiGroups: [""]
    resources: ["services"]
    verbs: ["get", "list", "create", "delete"]
  - apiGroups: ["networking.k8s.io"]
    resources: ["networkpolicies"]
    verbs: ["get", "list", "create", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: contmgr
  namespace: rootenv-users
subjects:
  - kind: ServiceAccount
    name: contmgr
    namespace: rootenv-infra
roleRef:
  kind: Role
  apiGroup: rbac.authorization.k8s.io
  name: contmgr
