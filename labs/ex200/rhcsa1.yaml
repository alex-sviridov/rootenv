meta:
  title: File Permissions and Ownership
  description: Practice managing Linux file permissions, ownership, and special bits essential for the RHCSA exam.

content:
  - title: Inspect Current Permissions
    content: |
      Use `ls -l` to examine file permissions and ownership.

      ```bash
      ls -l /etc/passwd
      ls -ld /tmp
      ```

      The output format is: `<type><owner><group><other>`. For example, `-rw-r--r--` means a regular file readable by everyone but writable only by the owner.

      **Task:** List the permissions of `/etc/shadow` and explain why it has those permissions.

  - title: Change File Ownership
    content: |
      The `chown` command changes file owner and group.

      ```bash
      # Create a test file
      touch /tmp/testfile

      # Change owner to alice
      chown alice /tmp/testfile

      # Change owner and group together
      chown alice:developers /tmp/testfile
      ```

      **Task:** Create a file `/tmp/labfile`, then change its owner to `bob` and group to `wheel`.

  - title: Set Permissions with chmod
    content: |
      Use `chmod` with symbolic or octal notation to set permissions.

      ```bash
      # Symbolic: add execute for owner
      chmod u+x script.sh

      # Octal: rw-r--r-- = 644
      chmod 644 /tmp/labfile

      # Remove all permissions for others
      chmod o-rwx /tmp/labfile
      ```

      **Task:** Set `/tmp/labfile` to `750` (owner: rwx, group: r-x, others: ---).

  - title: Special Permission Bits
    content: |
      Three special bits extend standard permissions:

      | Bit | Octal | Effect |
      |-----|-------|--------|
      | setuid | 4000 | File runs as owner |
      | setgid | 2000 | File runs as group; new files in dir inherit group |
      | sticky | 1000 | Only owner can delete files in directory |

      ```bash
      # Set sticky bit on a directory
      chmod +t /tmp/shared
      chmod 1777 /tmp/shared

      # Verify (look for 't' at end)
      ls -ld /tmp/shared
      ```

      **Task:** Create `/tmp/shared`, set permissions to `1775` (sticky + rwxrwxr-x), and verify.

  - title: Default Permissions with umask
    content: |
      `umask` defines which permission bits are *removed* from new files and directories.

      ```bash
      # View current umask
      umask

      # Default file max is 666; default dir max is 777
      # umask 022 → files get 644, dirs get 755

      # Temporarily set umask
      umask 027

      touch /tmp/newfile
      ls -l /tmp/newfile    # should be 640
      ```

      **Task:** Set `umask 027`, create `/tmp/umasktest`, confirm it has `640` permissions.

