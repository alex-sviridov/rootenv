meta:
  title: "Linux для аналитика: файловая система и работа с логами"
  description: Исследуем реальный Linux-сервер с работающим приложением — ориентируемся в файловой системе, находим и чистим мусор, извлекаем статистику из логов с помощью grep, awk, sed и sort.

content:
  - title: "Карта системы: где что живёт"
    content: |
      ## Стандарт файловой системы Linux (FHS)

      В Linux каждый файл находится на своём месте не случайно — есть стандарт Filesystem Hierarchy Standard (FHS), которому следует большинство дистрибутивов. Понимание этой карты экономит часы поиска.

      | Каталог | Назначение |
      |---------|-----------|
      | `/` | Корень — всё дерево начинается здесь |
      | `/app` | Кастомные приложения, не установленные через пакетный менеджер |
      | `/etc` | Конфигурационные файлы (читаемые, не бинарные) |
      | `/var/log` | Логи сервисов и системы |
      | `/var/lib` | Изменяемые данные приложений: базы, кэши, состояние |
      | `/home/<user>` | Домашняя папка пользователя |
      | `/tmp` | Временные файлы, очищаются при перезагрузке |
      | `/usr/bin`, `/bin` | Исполняемые файлы |

      На этом сервере запущен сервис **DataStream** — он принимает CSV-файлы с событиями от клиентов по HTTP, агрегирует их и отдаёт отчёты. Приложение не устанавливалось через `apt`, поэтому его код живёт в `/app`.

      ## Исследуем структуру приложения

      Команда `ls -lah` показывает файлы с правами, владельцем, размером и датой. Флаг `-h` делает размеры читаемыми (human-readable), `-a` показывает скрытые файлы.

      ```bash
      ls -lah /app/datastream/
      ```

      Обратите внимание на колонку владельца (третья) — файлы принадлежат пользователю `datastream`, а не вам. Это нормально: у каждого сервиса свой системный пользователь.

      ```bash
      ls -lah /app/datastream/data/
      ```

      **Упражнение:** Посмотрите содержимое конфигурационного файла сервиса. Найдите в нём, куда DataStream пишет логи и где хранит базу данных.

      ```bash
      cat /app/datastream/config.yaml
      ```

      ```exercise
      description: Просмотреть содержимое /app/datastream/config.yaml
      type: term
      asset: server-0
      template:
      access_log: /var/log/datastream/access\.log
      ```

      Запомните пути из секций `logging` и `storage` — они понадобятся в следующих заданиях.

      ## Домашние папки: пользователя и сервиса

      У пользователя `datastream` есть своя домашняя папка — `/home/datastream`. Это стандарт: системные пользователи (service accounts) тоже получают `$HOME`, туда попадают ключи SSH, старые скрипты деплоя, и всякий мусор, накопившийся за время эксплуатации.

      Ваша домашняя папка — `/home/lab`. Сокращения `~` и `$HOME` всегда указывают на домашнюю папку текущего пользователя.

      ```bash
      echo $HOME       # покажет /home/lab
      pwd              # текущая директория
      cd ~             # перейти домой
      ls -lah          # что там есть
      ```

      **Упражнение:** Перейдите в `/home/datastream` и выведите список файлов включая скрытые (`-a`). Запишите, что там лежит и примерные даты файлов — это пригодится позже.

      ```exercise
      description: Вывести содержимое /home/datastream включая скрытые файлы
      type: term
      asset: server-0
      template:
      \.bashrc
      ```

  - title: "Место на диске: df и du"
    content: |
      Вам пишут в чат: «DataStream еле дышит, кажется диск почти забит — разберись, что происходит». Прежде чем чинить, нужно понять масштаб проблемы.

      ## Два инструмента с разными ответами

      Есть два часто путаемых инструмента:

      - **`df`** (disk free) — показывает состояние **файловых систем** (разделов): сколько всего, сколько занято, сколько свободно. Отвечает на вопрос «есть ли место на диске».
      - **`du`** (disk usage) — показывает, сколько **конкретный каталог или файл** занимает на диске. Отвечает на вопрос «кто съел место».

      Типичная ситуация на сервере: `df` говорит, что диск почти полный, а вы ищете виновника через `du`.

      ## Смотрим общую картину

      ```bash
      df -h
      ```

      Флаг `-h` — human-readable. Смотрите на колонки `Use%` и `Avail`. Если `Use%` больше 80–85% — пора принимать меры.

      **Упражнение:** Запустите `df -h` и найдите раздел, на котором смонтирован `/var`. Сколько на нём свободно места?

      ```exercise
      description: Проверить свободное место на разделах через df
      type: term
      asset: server-0
      template:
      df\s+(-\w*h\w*|--human-readable)
      ```

      ## Ищем, кто занимает место

      Теперь нужно понять, какой каталог виновен. `du -sh` покажет суммарный размер директории (`-s` — summary, `-h` — human-readable).

      ```bash
      du -sh /app /var /home/*
      ```

      Это даст картину первого уровня. Чтобы провалиться глубже в подозрительный каталог:

      ```bash
      du -sh /var/lib/datastream/*
      ```

      Флаг `--max-depth=1` ограничивает глубину обхода — удобно для больших деревьев:

      ```bash
      du -h --max-depth=1 /var/lib/datastream/
      ```

      **Упражнение:** Найдите подкаталог или файл в `/var/lib/datastream/`, который занимает больше всего места. Также проверьте `/home/datastream/` — что там есть тяжёлого?

      ```exercise
      description: Оценить размеры подкаталогов /var/lib/datastream
      type: term
      asset: server-0
      template:
      du.*/var/lib/datastream
      ```

  - title: "Поиск файлов: find и очистка мусора"
    content: |
      ## Команда find

      `find` — мощный инструмент поиска файлов по любым параметрам: имени, расширению, размеру, дате, владельцу.

      Базовый синтаксис: `find <где искать> <условия> <действие>`

      | Ключ | Что делает | Пример |
      |------|-----------|--------|
      | `-name "*.tmp"` | По имени/маске | `-name "*.log"` |
      | `-size +10M` | По размеру (больше 10 МБ) | `-size +100M` |
      | `-mtime +30` | Не менялся больше 30 дней | `-mtime +7` |
      | `-type f` | Только файлы (не директории) | `-type d` для директорий |
      | `-delete` | Удалить найденное | осторожно! |

      ## Ищем мусор по расширению

      На сервере DataStream со временем накопился мусор: временные файлы кэша (`.tmp`), резервные копии базы (`.bak`), старые архивы деплоя.

      Сначала **всегда смотрим** что найдёт команда, прежде чем удалять:

      ```bash
      find /var/lib/datastream -name "*.tmp" -type f
      find /var/lib/datastream -name "*.bak" -type f
      ```

      **Упражнение:** Найдите все `.tmp` и `.bak` файлы в `/var/lib/datastream/`. Сколько их и каков их суммарный размер?

      ```exercise
      description: Найти .tmp файлы в /var/lib/datastream
      type: term
      asset: server-0
      template:
      /var/lib/datastream/.+\.tmp
      ```

      ```exercise
      description: Найти .bak файлы в /var/lib/datastream
      type: term
      asset: server-0
      template:
      /var/lib/datastream/.+\.bak
      ```

      ## Ищем по размеру и давности

      Старые архивы деплоя в домашней папке сервиса тоже хорошие кандидаты на удаление. Ищем файлы тяжелее 5 МБ, которые не трогали больше 30 дней:

      ```bash
      find /home/datastream -type f -size +5M -mtime +30
      ```

      Для поиска в нескольких папках сразу можно указать их через пробел:

      **Упражнение:** Расширьте поиск — найдите крупные старые файлы сразу в двух каталогах: `/var/lib/datastream/` и `/home/datastream/`. Составьте полный список того, что можно удалить.

      ```exercise
      description: Найти крупные старые файлы в /var/lib/datastream и /home/datastream одной командой
      type: term
      asset: server-0
      template:
      find.*
      /home/datastream/deploy_bundle_v1.tar.gz
      ```

      ## Удаляем

      Убедившись в списке, удаляем. Два способа:

      ```bash
      # Способ 1 — find с -delete (только если условия точные)
      find /var/lib/datastream/cache -name "*.tmp" -delete

      # Способ 2 — через xargs rm (можно добавить -i для подтверждения)
      find /var/lib/datastream -name "*.bak" | xargs rm -v
      ```

      После удаления проверьте, что место освободилось:

      ```bash
      df -h
      du -sh /var/lib/datastream/
      ```

      **Упражнение:** Главный виновник — кэш-файлы `.tmp` в `/var/lib/datastream/cache/` (десятки мегабайт). Удалите их. Затем удалите `.bak` файлы и старый архив `old_export_2024_01.tar.gz` из `/var/lib/datastream/`, а также старые архивы из `/home/datastream/` (файлы старше 30 дней). Убедитесь через `df -h`, что свободного места стало больше.

      ```exercise
      description: Удалить .tmp кэш-файлы из /var/lib/datastream
      type: term
      asset: server-0
      template:
      (find\s+.*var/lib/datastream.*(-name|-iname)\s+.?\*\.tmp.*(-delete|xargs\s+rm)|rm\s+.*var/lib/datastream.*\.tmp)
      ```

      ```exercise
      description: Удалить .bak файлы из /var/lib/datastream
      type: term
      asset: server-0
      template:
      (find\s+.*var/lib/datastream.*(-name|-iname)\s+.?\*\.bak.*(-delete|xargs\s+rm)|rm\s+.*var/lib/datastream.*\.bak)
      ```

      ```exercise
      description: Удалить старый архив old_export_2024_01.tar.gz из /var/lib/datastream
      type: term
      asset: server-0
      template:
      (find\s+.*var/lib/datastream.*-mtime\s+\+\d+.*(-delete|xargs\s+rm)|rm\s+.*var/lib/datastream.*old_export)
      ```

      ```exercise
      description: Удалить старые архивы (>30 дней) из /home/datastream
      type: term
      asset: server-0
      template:
      (find\s+.*home/datastream.*-mtime\s+\+\d+.*(-delete|xargs\s+rm)|rm\s+.*home/datastream)
      ```

      ```exercise
      description: Проверить свободное место после удаления
      type: term
      asset: server-0
      template:
      df\s+(-\w*h\w*|--human-readable)
      ```

      Итог: было занято под сотню мегабайт мусора — кэш, бэкапы, забытые архивы. Освобождённое место снова видно в `df -h`.

  - title: "CSV: данные без базы"
    content: |
      ## CSV — самый простой формат обмена данными

      Диск расчищен — теперь можно заняться тем, ради чего вы вообще на этом сервере: данными. Параллельно с access.log DataStream складывает сырые события в CSV-файлы — путь виден в `config.yaml` из первой задачи, секция `storage.data_dir`.

      CSV (Comma-Separated Values) — простой текстовый формат: одна строка = одна запись, поля разделены запятой, первая строка — заголовок с именами колонок.

      ```bash
      ls -lah /app/datastream/data/
      ```

      Три файла: `events_2024_01.csv`, `events_2024_02.csv` — события клиентов по месяцам, `clients.csv` — справочник клиентов (имя, тариф, регион).

      ## Смотрим формат и считаем строки

      ```bash
      head -5 /app/datastream/data/events_2024_01.csv
      wc -l /app/datastream/data/events_2024_01.csv
      ```

      `wc -l` посчитает и строку заголовка — реальных событий на одну меньше.

      **Упражнение:** Посчитайте, сколько строк (включая заголовок) в `events_2024_01.csv` и в `events_2024_02.csv`.

      ```exercise
      description: Посчитать строки в events_2024_01.csv и events_2024_02.csv
      type: term
      asset: server-0
      template:
      wc\s+-l[\s\S]*(events_2024_01\.csv[\s\S]*events_2024_02\.csv|events_2024_02\.csv[\s\S]*events_2024_01\.csv)
      ```

      ## Вырезаем колонку

      `cut -d',' -f2` вырезает второе поле, разделённое запятой. Тот же результат даёт `awk -F, '{print $2}'`.

      ```bash
      cut -d',' -f2 /app/datastream/data/events_2024_01.csv
      ```

      **Упражнение:** Выведите список уникальных `client_id`, которые встречаются в `events_2024_01.csv`. Вырежьте колонку и отсортируйте через `sort -u` (сразу уникальные отсортированные значения, без отдельного `uniq`).

      ```exercise
      description: Список уникальных client_id за январь
      type: term
      asset: server-0
      template:
      (cut\s+-d\s*\S+\s+-f\s*2|awk\s+-F\s*,).*events_2024_01\.csv.*\|\s*sort\s+-u
      ```

      ## Фильтруем по значению поля

      `awk -F,` задаёт разделитель полей — запятую вместо пробела по умолчанию. Условие пишется перед `{...}`, как раньше в access.log:

      ```bash
      awk -F, '$3 == "purchase" {print}' /app/datastream/data/events_2024_02.csv
      ```

      **Упражнение:** Найдите все строки с `event_type` равным `purchase` в `events_2024_02.csv`.

      ```exercise
      description: Найти purchase-события в events_2024_02.csv
      type: term
      asset: server-0
      template:
      awk\s+-F\s*,.*\$3\s*==\s*["']?purchase["']?.*events_2024_02\.csv
      ```

      ## Склеиваем файлы — осторожно с заголовком

      Классическая ошибка при склейке CSV: если просто `cat` два файла с одинаковыми колонками, заголовок продублируется — строка `timestamp,client_id,event_type,value,region` из второго файла попадёт в данные как обычная запись.

      ```bash
      cat /app/datastream/data/events_2024_01.csv /app/datastream/data/events_2024_02.csv | head -3
      # ...а где-то в середине результата вылезет строка заголовка — это не событие
      ```

      Решение — оставить заголовок только от первого файла, а у второго отрезать первую строку через `tail -n +2`:

      ```bash
      (head -1 /app/datastream/data/events_2024_01.csv; \
       tail -n +2 /app/datastream/data/events_2024_01.csv; \
       tail -n +2 /app/datastream/data/events_2024_02.csv) > ~/reports/events_combined.csv
      ```

      **Упражнение:** Соберите оба месяца в `~/reports/events_combined.csv` с одним заголовком — без дублей.

      ```exercise
      description: Собрать events_combined.csv без дублирования заголовка
      type: term
      asset: server-0
      template:
      (tail\s+-n\s*\+2|awk\s+.*(FNR|NR\s*==\s*1)|sed\s+.*1d).*>\s*.*reports/events_combined\.csv
      ```

      Теперь у вас под рукой `clients.csv` — справочник с тарифом и регионом клиента. Узнать тариф одного клиента можно через `grep client_042 clients.csv`. Но если нужно посчитать выручку по тарифам сразу для всех клиентов — сопоставлять вручную построчно уже больно. Для таких задач есть настоящая база данных.

  - title: "SQLite: запросы к реальной базе"
    content: |
      ## Когда одной таблицы мало

      CSV отлично подходит, пока данные помещаются в один файл и не нужно ничего связывать. DataStream параллельно хранит те же события в настоящей базе — SQLite, файл `/var/lib/datastream/events.db` (путь снова из `config.yaml`, секция `storage.db_path`).

      SQLite — СУБД, которая живёт в одном файле, без отдельного сервера. Утилита `sqlite3` умеет и открывать интерактивную сессию, и выполнять один SQL-запрос сразу из командной строки — вторым способом удобнее пользоваться для одноразовых вопросов в терминале:

      ```bash
      sqlite3 /var/lib/datastream/events.db "SELECT 1;"
      ```

      ## Смотрим структуру

      Интерактивная сессия (`sqlite3 /var/lib/datastream/events.db`, затем `.tables`, `.schema events`, выход — `.quit`) удобна для разведки. Дальше в задаче используем однострочный вызов `sqlite3 <файл> "<SQL>"` — так проще один раз получить готовый ответ.

      ```bash
      sqlite3 /var/lib/datastream/events.db ".tables"
      sqlite3 /var/lib/datastream/events.db ".schema events"
      ```

      **Упражнение:** Посмотрите схему таблицы `events` — какие у неё колонки?

      ```exercise
      description: Посмотреть схему таблицы events
      type: term
      asset: server-0
      template:
      (?i)sqlite3.*events\.db.*\.schema\s+events
      ```

      ## SELECT с условием

      Обычный SQL: `SELECT колонки FROM таблица WHERE условие;`.

      ```bash
      sqlite3 /var/lib/datastream/events.db "SELECT * FROM events WHERE client_id = 'client_042';"
      ```

      **Упражнение:** Выведите все события клиента `client_017`.

      ```exercise
      description: Выбрать все события client_017
      type: term
      asset: server-0
      template:
      (?i)SELECT.*FROM\s+events.*WHERE.*client_017
      ```

      ## Агрегация: GROUP BY

      `SUM(value)` суммирует колонку, `GROUP BY client_id` считает сумму отдельно для каждого клиента:

      ```bash
      sqlite3 /var/lib/datastream/events.db \
        "SELECT client_id, SUM(value) FROM events WHERE event_type = 'purchase' GROUP BY client_id;"
      ```

      Обратите внимание: в таблице есть и `refund` — тоже с положительным `value`, как и `purchase`. Этот запрос их не учитывает (фильтр `event_type = 'purchase'`), но если бы считали «чистую» выручку, рефанды нужно было бы вычитать отдельно — типичная ловушка при работе с реальными данными.

      **Упражнение:** Посчитайте суммарную выручку от `purchase`-событий по каждому клиенту.

      ```exercise
      description: Сумма purchase по client_id через GROUP BY
      type: term
      asset: server-0
      template:
      (?i)SELECT.*SUM\s*\(\s*value\s*\).*FROM\s+events.*purchase.*GROUP\s+BY\s+client_id
      ```

      ## JOIN: связываем таблицы

      В `events` есть только `client_id`, а тариф и регион клиента — в таблице `clients`. `JOIN` связывает две таблицы по общему полю:

      ```bash
      sqlite3 /var/lib/datastream/events.db \
        "SELECT c.plan, SUM(e.value) FROM events e JOIN clients c ON e.client_id = c.client_id WHERE e.event_type = 'purchase' GROUP BY c.plan;"
      ```

      Это тот самый отчёт, который в прошлой задаче пришлось бы сшивать вручную по `clients.csv`, — здесь одна команда.

      **Упражнение:** Постройте отчёт по выручке `purchase`-событий, сгруппированной по тарифу (`plan`) клиента, через `JOIN` таблиц `events` и `clients`.

      ```exercise
      description: Выручка purchase по тарифу через JOIN events и clients
      type: term
      asset: server-0
      template:
      (?i)SUM.*JOIN.*GROUP\s+BY.*plan
      ```

      ## Сохраняем отчёт

      Флаги `-header -csv` заставляют `sqlite3` вывести результат как CSV с заголовком — удобно сразу перенаправить в файл:

      ```bash
      sqlite3 -header -csv /var/lib/datastream/events.db \
        "SELECT c.plan, SUM(e.value) AS revenue FROM events e JOIN clients c ON e.client_id = c.client_id WHERE e.event_type = 'purchase' GROUP BY c.plan;" \
        > ~/reports/revenue_by_plan.csv
      ```

      **Задание:** Сохраните отчёт по выручке за тарифом в `~/reports/revenue_by_plan.csv`.

      ```exercise
      description: Сохранить отчёт revenue_by_plan.csv
      type: term
      asset: server-0
      template:
      sqlite3.*>\s*.*reports/revenue_by_plan\.csv
      ```

      Структурированные данные удобны, когда они есть. Но access.log, который вы открывали в первой задаче, никакой базой не является — это просто текст. Возвращаемся к grep, awk и sed, чтобы разобрать его.

  - title: "Grep: фильтруем access.log"
    content: |
      ## Что такое access.log

      Структурированные данные — таблицы и CSV — удобны, когда они есть. Но лог-файлы устроены иначе: это просто текст, строка за строкой, без схемы и без SQL. DataStream пишет лог каждого HTTP-запроса в формате Nginx combined log:

      ```
      185.220.101.42 - - [01/Mar/2024:00:03:17 +0000] "POST /api/upload HTTP/1.1" 200 4823 "-" "python-requests/2.28.0"
      ```

      Поля слева направо: IP-адрес клиента, прочерки (auth), дата/время, метод+эндпоинт+протокол, HTTP-код ответа, размер ответа в байтах, referrer, user-agent.

      Лог лежит по пути из `config.yaml`:

      ```bash
      wc -l /var/log/datastream/access.log    # сколько строк в логе
      head -5 /var/log/datastream/access.log  # смотрим формат
      ```

      ## Grep: основные флаги

      | Флаг | Значение |
      |------|---------|
      | `-i` | игнорировать регистр |
      | `-v` | инвертировать (строки НЕ содержащие шаблон) |
      | `-c` | посчитать совпадения вместо вывода |
      | `-n` | показывать номера строк |
      | `-E` | расширенные регулярные выражения |

      ## Ищем ошибки

      HTTP 500 — ошибка на стороне сервера. Найдём все такие запросы:

      ```bash
      grep ' 500 ' /var/log/datastream/access.log
      ```

      Пробелы вокруг 500 важны — иначе попадут строки где 500 встречается в другом контексте (например, в размере ответа).

      Посчитаем сколько их:

      ```bash
      grep -c ' 500 ' /var/log/datastream/access.log
      ```

      **Упражнение:** Найдите все запросы с кодом 404 и 503. Посчитайте количество каждого отдельно. Затем найдите все **не-200** ответы одной командой — используйте флаг `-v` чтобы исключить успешные запросы.

      ```exercise
      description: Посчитать количество запросов с кодом 404
      type: term
      asset: server-0
      template:
      grep\s+.*(-c\s+.*['" ]404['" ]|['" ]404['" ].*\|\s*wc\s+-l)
      ```

      ```exercise
      description: Посчитать количество запросов с кодом 503
      type: term
      asset: server-0
      template:
      grep\s+.*(-c\s+.*['" ]503['" ]|['" ]503['" ].*\|\s*wc\s+-l)
      ```

      ```exercise
      description: Найти все не-200 ответы одной командой через grep -v
      type: term
      asset: server-0
      template:
      grep\s+.*-v.*['" ]200['" ]
      ```

      ## Фильтрация по IP и эндпоинту

      Предположим, нас интересует один подозрительный IP — `185.220.101.42`:

      ```bash
      grep '185.220.101.42' /var/log/datastream/access.log | head -20
      ```

      Посмотрим только ошибки от этого IP (цепочка через `|`):

      ```bash
      grep '185.220.101.42' /var/log/datastream/access.log | grep ' 500 '
      ```

      **Упражнение:** Найдите все запросы к эндпоинту `/api/upload` которые завершились ошибкой (любой код 4xx или 5xx). Пригодится `-E` для регулярного выражения с несколькими кодами, например `' [45][0-9][0-9] '` — но подойдёт любой синтаксис, дающий тот же результат (в том числе `awk`).

      ```exercise
      description: Найти запросы к /api/upload с кодами 4xx или 5xx
      type: term
      asset: server-0
      template:
      api/upload[\s\S]*"\s+[45]\d\d\s
      ```

  - title: "Awk и sed: извлекаем и трансформируем данные"
    content: |
      ## Awk: построчная обработка с полями

      `awk` обрабатывает текст построчно, разбивая каждую строку на поля по разделителю (по умолчанию — пробел). Поля доступны как `$1`, `$2`, `$3`... `$NF` — последнее поле.

      Строка лога:
      ```
      185.220.101.42 - - [01/Mar/2024:00:03:17 +0000] "POST /api/upload HTTP/1.1" 200 4823 "-" "python-requests/2.28.0"
      ```

      | Поле | Значение |
      |------|---------|
      | `$1` | IP-адрес |
      | `$7` | HTTP-код ответа |
      | `$10` | размер ответа в байтах |

      ## Извлекаем нужные столбцы

      ```bash
      awk '{print $1, $7, $10}' /var/log/datastream/access.log | head -10
      ```

      Добавим заголовок и ограничение:

      ```bash
      awk 'BEGIN{print "IP CODE BYTES"} {print $1, $7, $10}' /var/log/datastream/access.log | head -20
      ```

      **Упражнение:** Выведите только строки с HTTP-кодом 500 — добавьте условие в awk. В awk условие пишется перед `{...}`:

      ```bash
      awk '$7 == "500" {print $1, $7, $10}' /var/log/datastream/access.log
      ```

      Теперь сделайте то же самое для кода 404 самостоятельно.

      ```exercise
      description: Вывести строки с кодом 500 через awk с условием
      type: term
      asset: server-0
      template:
      awk\s+.*\$7\s*==\s*["']?500["']?
      ```

      ```exercise
      description: Вывести строки с кодом 404 через awk с условием
      type: term
      asset: server-0
      template:
      awk\s+.*\$7\s*==\s*["']?404["']?
      ```

      ## Агрегация: считаем суммарный трафик

      `awk` умеет накапливать переменные между строками:

      ```bash
      awk '{sum += $10} END {print "Total bytes:", sum}' /var/log/datastream/access.log
      ```

      `END{}` выполняется после обработки всех строк.

      **Упражнение:** Посчитайте суммарный объём трафика только по успешным запросам (код 200). Затем найдите суммарный объём ответов с ошибками 500 — это поможет оценить, сколько данных клиенты получили обратно в виде сообщений об ошибках.

      ```exercise
      description: Посчитать суммарный трафик для запросов с кодом 200
      type: term
      asset: server-0
      template:
      awk\s+.*\$7\s*==\s*["']?200["']?.*sum\s*\+=\s*\$10
      ```

      ```exercise
      description: Посчитать суммарный трафик для запросов с кодом 500
      type: term
      asset: server-0
      template:
      awk\s+.*\$7\s*==\s*["']?500["']?.*sum\s*\+=\s*\$10
      ```

      Сумма — не единственная агрегация. Если разделить сумму на число обработанных строк, получится среднее. Для этого в `END{}` пригодится счётчик строк, например `n`, увеличиваемый на каждой строке:

      ```bash
      awk '{sum += $10; n++} END {print "Average bytes:", sum/n}' /var/log/datastream/access.log
      ```

      **Упражнение:** Посчитайте средний размер ответа (в байтах) для запросов к `/api/upload`.

      ```exercise
      description: Посчитать средний размер ответа для /api/upload
      type: term
      asset: server-0
      template:
      (awk[\s\S]*api\\?/upload|api\\?/upload[\s\S]*awk).*sum\s*\+=\s*\$10.*sum\s*/\s*(n|NR)
      ```

      ## Sed: замена и трансформация текста

      `sed` (stream editor) обрабатывает текст построчно применяя команды. Самая частая — замена `s/что/на что/флаги`.

      Маскируем IP-адреса (последний октет → `xxx`) для анонимизации перед передачей:

      ```bash
      sed 's/\([0-9]\+\.[0-9]\+\.[0-9]\+\)\.[0-9]\+/\1.xxx/g' /var/log/datastream/access.log | head -5
      ```

      Это сложное выражение — не нужно его запоминать, но важно понять принцип: `\(...\)` захватывает группу, `\1` подставляет её обратно.

      Более простой пример — заменить `ERROR` на `[CRITICAL]` в error.log:

      ```bash
      sed 's/\[ERROR\]/[CRITICAL]/g' /var/log/datastream/error.log | head -10
      ```

      **Упражнение:** Замените `[ERROR]` на `[CRITICAL]` во всём `error.log` и сохраните результат в `~/reports/error_critical.log`.

      ```exercise
      description: Заменить [ERROR] на [CRITICAL] в error.log через sed
      type: term
      asset: server-0
      template:
      sed\s+.*ERROR.*CRITICAL.*>\s*.*reports/error_critical\.log
      ```

      **Упражнение:** Создайте очищенную версию access.log в вашей папке отчётов — только строки с ошибками 500, с анонимизированными IP. Используйте цепочку `grep | sed > файл`:

      ```exercise
      description: Создать очищенный errors_500_anon.log с анонимизированными IP
      type: term
      asset: server-0
      template:
      grep\s+.*500.*\|\s*sed\s+.*>\s*.*errors_500_anon\.log
      ```

      ```bash
      grep ' 500 ' /var/log/datastream/access.log \
        | sed 's/\([0-9]\+\.[0-9]\+\.[0-9]\+\)\.[0-9]\+/\1.xxx/g' \
        > ~/reports/errors_500_anon.log

      wc -l ~/reports/errors_500_anon.log
      cat ~/reports/errors_500_anon.log | head -5
      ```

      ## Текстовый конвейер тоже умеет производить CSV

      В задачах про CSV и SQLite вы читали готовые структурированные данные. Но `awk` и `sed` вместе умеют и создавать их — из произвольного текста, вроде access.log.

      ```bash
      awk '{print $1, $7}' /var/log/datastream/access.log | sed 's/ /,/' | head -5
      ```

      **Упражнение:** Постройте CSV `ip,code` (IP-адрес и HTTP-код через запятую) по всему access.log и сохраните в `~/reports/ip_code.csv`.

      ```exercise
      description: Собрать ip,code как CSV в ip_code.csv
      type: term
      asset: server-0
      template:
      awk.*sed.*>\s*.*reports/ip_code\.csv
      ```

  - title: "Sort, uniq и финальный конвейер"
    content: |
      ## Инструменты финального анализа

      | Команда | Что делает |
      |---------|-----------|
      | `sort` | Сортирует строки по алфавиту или числам |
      | `sort -n` | Числовая сортировка |
      | `sort -r` | Обратный порядок (по убыванию) |
      | `sort -k2 -n` | Сортировать по второму полю числово |
      | `uniq` | Убирает повторяющиеся **соседние** строки |
      | `uniq -c` | Считает количество повторений |
      | `cut -d' ' -f1` | Вырезает поле 1 по разделителю пробел |
      | `head -N` | Оставляет первые N строк |

      Ключевое правило: `uniq` работает только с отсортированными данными — перед `uniq` почти всегда стоит `sort`.

      ## Топ IP по количеству запросов

      Классический конвейер — «кто больше всех стучится»:

      ```bash
      awk '{print $1}' /var/log/datastream/access.log \
        | sort \
        | uniq -c \
        | sort -rn \
        | head -5
      ```

      Разбор по шагам:
      1. `awk '{print $1}'` — вытащить только IP
      2. `sort` — отсортировать (нужно для uniq)
      3. `uniq -c` — посчитать каждый уникальный IP
      4. `sort -rn` — по убыванию числово
      5. `head -5` — оставить топ-5

      **Упражнение:** Модифицируйте команду чтобы получить топ-3 IP только среди ошибок 500. Добавьте `grep ' 500 '` в начало конвейера (перед `awk`).

      ```exercise
      description: Получить топ-3 IP среди запросов с ошибкой 500
      type: term
      asset: server-0
      template:
      grep\s+.*500.*\|\s*awk.*\|\s*sort\s*\|\s*uniq\s+-c\s*\|\s*sort\s+-\w*[rn]\w*[rn]\w*\s*\|\s*head\s+-3
      ```

      ## Топ проблемных эндпоинтов

      Поле `$6` в логе — это HTTP-метод+эндпоинт в кавычках: `"POST /api/upload`. Эндпоинт — поле `$7` (после метода):

      ```bash
      awk '$7 ~ /^[45]/ {print $6}' /var/log/datastream/access.log \
        | sort | uniq -c | sort -rn | head -10
      ```

      Здесь `$7 ~ /^[45]/` — условие: код начинается с 4 или 5. `$6` — метод+путь.

      **Упражнение:** Постройте список эндпоинтов (только путь, без метода) отсортированных по числу ошибок 500. Подсказка: используйте `awk '$7 == "500" {print $6}'`, затем через `cut` или второй `awk` обрежьте кавычку и метод чтобы остался только путь.

      ```exercise
      description: Список эндпоинтов отсортированных по числу ошибок 500
      type: term
      asset: server-0
      template:
      awk\s+.*\$7\s*==\s*["']?500["']?.*\|\s*(cut|awk|sed).*\|\s*sort\s*\|\s*uniq\s+-c\s*\|\s*sort\s+-\w*[rn]\w*[rn]\w*
      ```

      ## Финальный конвейер: отчёт в файл

      Соберите итоговый отчёт — топ-5 IP, топ-5 эндпоинтов с ошибками, общее количество 4xx/5xx — и запишите в `~/reports/summary.txt`.

      ```bash
      {
        echo "=== TOP 5 IP BY REQUESTS ==="
        awk '{print $1}' /var/log/datastream/access.log \
          | sort | uniq -c | sort -rn | head -5

        echo ""
        echo "=== TOP 5 ENDPOINTS WITH 500 ==="
        awk '$7 == "500" {print $6}' /var/log/datastream/access.log \
          | sort | uniq -c | sort -rn | head -5

        echo ""
        echo "=== ERROR COUNTS BY CODE ==="
        awk '$7 ~ /^[45]/ {print $7}' /var/log/datastream/access.log \
          | sort | uniq -c | sort -rn
      } > ~/reports/summary.txt

      cat ~/reports/summary.txt
      ```

      ```exercise
      description: Собрать итоговый отчёт в ~/reports/summary.txt
      type: term
      asset: server-0
      template:
      >\s*.*reports/summary\.txt
      ```

      **Финальное задание:** Дополните отчёт четвёртой секцией — «TOP 5 IP по суммарному трафику (байт)». Для этого нужно суммировать `$10` (байты) для каждого уникального IP — `awk` с массивом:

      ```bash
      awk '{bytes[$1] += $10} END {for (ip in bytes) print bytes[ip], ip}' \
        /var/log/datastream/access.log | sort -rn | head -5
      ```

      Добавьте эту секцию в `~/reports/summary.txt` и покажите финальный файл командой `cat ~/reports/summary.txt`.

      ```exercise
      description: Посчитать суммарный трафик по IP и добавить топ-5 в summary.txt
      type: term
      asset: server-0
      template:
      awk\s+.*bytes\[\$1\]\s*\+=\s*\$10.*>>?\s*.*reports/summary\.txt
      ```

      ```exercise
      description: Показать финальный файл summary.txt
      type: term
      asset: server-0
      template:
      cat\s+.*reports/summary\.txt
      ```

environment:
  duration: 150
  assets:
    - name: server-0
      image: ubuntu-analytics
      cpu: 200m
      memory: 256Mi
      disk: 5Gi
      protocols:
        - exec
