meta:
  title: Platform Smoke Test
  description: Verify inter-node networking, internet isolation, and basic filesystem operations across a two-node lab environment.

content:
  - title: Identify the Nodes
    content: |
      Before testing connectivity, establish the identity of each node. Every host exposes its name and network configuration through standard files and tools.

      Short hostname assigned at boot:

      ```bash
      echo "=== Hostname ==="
      hostname
      ```

      ```exercise
      description: Check hostname on server-0
      type: term
      asset: server-0
      template:
      hostname
      ```

      All interfaces and their IP addresses: 

      ```bash
      echo "=== Network interfaces ==="
      ip addr show
      ```

      ```exercise
      description: Check network interfaces on server-0
      type: term
      asset: server-0
      template:
      ip\s+addr\s+show
      ```

      Distribution name and version:

      ```bash
      echo "=== OS release ==="
      grep -E '^(NAME|VERSION)=' /etc/os-release
      ```

      ```exercise
      description: Check OS release info on server-0
      type: term
      asset: server-0
      template:
      grep\s+-E\s+.*os-release
      ```

      How long the node has been running:
      
      ```bash
      echo "=== Uptime ==="
      uptime -p
      ```

      ## Finding the peer IP

      To ping **server-1** in the next task you'll need its IP address. The simplest way is to resolve its hostname — the lab network registers each node under its asset name:

      ```bash
      # From server-0
      getent hosts server-1
      ```

      ```exercise
      description: Resolve server-1's IP from server-0
      type: term
      asset: server-0
      template:
      getent\s+hosts\s+server-1
      ```

      The first column is the IPv4 address. Note it down.

environment:
  duration: 20
  assets:
    - name: server-0
      image: ubuntu-sshd
      cpu: 100m
      memory: 128Mi
      disk: 1Gi
      protocols:
        - exec
    - name: server-1
      image: ubuntu-sshd
      cpu: 100m
      memory: 128Mi
      disk: 1Gi
      protocols:
        - exec
      setup: |
        mkdir -p /tmp/testdir