---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.20.1
  name: labenvironments.lab.rootenv.io
spec:
  group: lab.rootenv.io
  names:
    kind: LabEnvironment
    listKind: LabEnvironmentList
    plural: labenvironments
    shortNames:
    - labenv
    singular: labenvironment
  scope: Cluster
  versions:
  - additionalPrinterColumns:
    - jsonPath: .status.ready
      name: Ready
      type: string
    - jsonPath: .status.phase
      name: Status
      type: string
    - jsonPath: .spec.ownerName
      name: Owner
      priority: 1
      type: string
    - jsonPath: .spec.labId
      name: Lab
      priority: 1
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    - jsonPath: .status.expiresAt
      name: Expires At
      type: string
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: LabEnvironment is the Schema for the labenvironments API
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: spec defines the desired state of LabEnvironment
            properties:
              assets:
                description: Assets is a list of assets that should be provisioned
                  as part of this lab environment.
                items:
                  description: Asset defines a single asset to be provisioned as part
                    of the lab environment, such as a VM or container.
                  properties:
                    cpu:
                      default: 100m
                      description: CPU limit for this asset, e.g. "500m" for 0.5 CPU
                        cores.
                      type: string
                    disk:
                      default: 1Gi
                      description: Disk is the ephemeral-storage limit for this asset
                        (protects the host from disk exhaustion), e.g. "2Gi".
                      type: string
                    image:
                      description: |-
                        Image specifies the lab image name. labenv-operator resolves it against the lab-images
                        ConfigMap; if no match is found, the name is used as-is (e.g. a public image like "ubuntu").
                      type: string
                    memory:
                      default: 128Mi
                      description: Memory limit for this asset, e.g. "256Mi" for 256
                        MiB of memory.
                      type: string
                    name:
                      description: Name is a unique identifier for this asset within
                        the lab environment.
                      type: string
                    protocols:
                      description: Protocols is a list of protocols that should be
                        enabled for this asset, e.g. ["ssh", "http"].
                      items:
                        enum:
                        - exec
                        - http
                        type: string
                      type: array
                    setup:
                      description: Setup is an optional script that should be executed
                        to set up the asset after it is provisioned.
                      type: string
                  required:
                  - image
                  - name
                  type: object
                type: array
              labId:
                description: LabId identifies which lab definition to provision.
                maxLength: 63
                pattern: ^[A-Za-z0-9](?:[-A-Za-z0-9_.]*[A-Za-z0-9])?$
                type: string
              ownerId:
                description: OwnerId is the ID of the user who owns this lab environment.
                maxLength: 63
                pattern: ^[A-Za-z0-9](?:[-A-Za-z0-9_.]*[A-Za-z0-9])?$
                type: string
              ownerName:
                description: OwnerName is the name of the user who owns this lab environment
                  (for display purposes only).
                type: string
              ttl:
                default: 60
                description: TTL (minutes) is the time-to-live for this lab environment,
                  after which it should be automatically deleted.
                format: int32
                type: integer
            required:
            - assets
            - labId
            - ownerId
            type: object
          status:
            description: status defines the observed state of LabEnvironment
            properties:
              assets:
                description: Assets lists the state of each asset
                items:
                  properties:
                    address:
                      type: string
                    name:
                      type: string
                    phase:
                      type: string
                    protocols:
                      items:
                        type: string
                      type: array
                    ready:
                      type: boolean
                    reason:
                      type: string
