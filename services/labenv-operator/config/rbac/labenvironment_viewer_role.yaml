# This rule is not used by the project labenv-operator itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants read-only access to lab.rootenv.io resources.
# This role is intended for users who need visibility into these resources
# without permissions to modify them. It is ideal for monitoring purposes and limited-access viewing.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: labenv-operator
    app.kubernetes.io/managed-by: kustomize
  name: labenvironment-viewer-role
rules:
- apiGroups:
  - lab.rootenv.io
  resources:
  - labenvironments
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - lab.rootenv.io
  resources:
  - labenvironments/status
  verbs:
  - get
