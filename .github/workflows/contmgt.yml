name: Contmgr CI

on:
  push:
    branches: [master]
    paths: [ 'contmgr/**', '.github/workflows/contmgt.yml' ]
  pull_request:
    branches: [master]
    paths: [ 'contmgr/**', '.github/workflows/contmgt.yml' ]
    types: [opened, synchronize, reopened]

jobs:
  test-lint:
    name: Test & Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          cache-dependency-path: contmgr/go.sum

      - name: Run Tests
        working-directory: contmgr
        run: go test ./...

      - name: Run Lint
        uses: golangci/golangci-lint-action@v6
        with:
          working-directory: contmgr

  security:
    name: Security Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          cache-dependency-path: contmgr/go.sum

      - name: Run govulncheck
        working-directory: contmgr
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...

      - name: Run Trivy Security Scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: ./contmgr
          scanners: vuln,secret,misconfig
          ignore-unfixed: true
          exit-code: '1'
