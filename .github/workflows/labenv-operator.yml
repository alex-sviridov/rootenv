name: LabEnv-Operator CI

on:
  push:
    branches: [master]
    paths: [ 'services/labenv-operator/**', '.github/workflows/labenv-operator.yml' ]
  pull_request:
    branches: [master]
    paths: [ 'services/labenv-operator/**', '.github/workflows/labenv-operator.yml' ]
    types: [opened, synchronize, reopened]

# Cancel superseded runs on the same branch/PR to save minutes
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Least-privilege default; jobs that need more elevate locally
permissions:
  contents: read

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/labenv-operator

jobs:
  test-and-build:
    name: Test & Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: '1.26'
          cache-dependency-path: services/labenv-operator/go.sum
      - name: Verify generated code & manifests are up to date
        working-directory: services/labenv-operator
        run: |
          make manifests generate
          git diff --exit-code
      - name: Run tests (envtest)
        working-directory: services/labenv-operator
        run: make test
      - name: Build
        working-directory: services/labenv-operator
        run: make build

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: '1.26'
          cache-dependency-path: services/labenv-operator/go.sum
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.12
          working-directory: services/labenv-operator

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: '1.26'
          cache-dependency-path: services/labenv-operator/go.sum
      - name: Run govulncheck
        working-directory: services/labenv-operator
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck -scan library ./...
      - name: Cache Trivy DB
        uses: actions/cache@v4
        with:
          path: ~/.cache/trivy
          key: trivy-db-${{ github.run_id }}
          restore-keys: trivy-db-
      - name: Run Trivy Security Scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: ./services/labenv-operator
          scanners: vuln,secret,misconfig
          ignore-unfixed: true
          exit-code: '1'

  docker-build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: [lint, test-and-build, security-scan]
    # Only run the no-push build path on PRs; on master we go straight to docker-push
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v6
        with:
          context: services/labenv-operator
          push: false
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:pr-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  docker-push:
    name: Push Docker Image
    runs-on: ubuntu-latest
    needs: [lint, test-and-build, security-scan]
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/setup-buildx-action@v3
      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=sha-,format=short
      - uses: docker/build-push-action@v6
        with:
          context: services/labenv-operator
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max