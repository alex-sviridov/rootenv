apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../base

images:
  - name: rootenv-frontend
  - name: rootenv-backend
  - name: labenv-operator
  - name: attempt-controller
  - name: relay-exec

patches:
  - target:
      kind: Deployment
      name: labenv-operator-controller-manager
    patch: |-
      - op: replace
        path: /spec/template/spec/containers/0/imagePullPolicy
        value: IfNotPresent
      - op: add
        path: /spec/template/spec/containers/0/env
        value:
          - name: RELAY_IMAGE
            value: "relay-exec:1d609cee6d7a5d3c24bd02791a9cd19d36ca337f39cb16e64cb7c1ac64dedf95"
          - name: RELAY_INGRESS_CLASS
            value: "traefik"
          - name: RELAY_INGRESS_ANNOTATIONS
            value: "traefik.ingress.kubernetes.io/router.entrypoints=websecure,traefik.ingress.kubernetes.io/router.middlewares=kube-system-relay-exec-strip-prefix@kubernetescrd"
          - name: RELAY_INGRESS_BASE_PATH
            value: "/relay/exec"
