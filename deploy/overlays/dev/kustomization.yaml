apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../base

images:
  - name: rootenv-frontend
  - name: rootenv-backend
  - name: labenv-operator
  - name: attempt-controller
  - name: relay-exec
  - name: ingress-authenticator

patches:
  - target:
      kind: Deployment
      name: labenv-operator-controller-manager
    patch: |-
      - op: replace
        path: /spec/template/spec/containers/0/imagePullPolicy
        value: IfNotPresent
      - op: add
        path: /spec/template/spec/containers/0/env
        value:
          - name: RELAY_IMAGE
            value: "relay-exec:72396645ae0376a2e536bff563924a183fb4e15298b92e270635f97a5435358c"
          - name: RELAY_INGRESS_CLASS
            value: "traefik"
          - name: RELAY_INGRESS_ANNOTATIONS
            value: "traefik.ingress.kubernetes.io/router.entrypoints=web"
          - name: RELAY_INGRESS_BASE_PATH
            value: "/relay/exec"
