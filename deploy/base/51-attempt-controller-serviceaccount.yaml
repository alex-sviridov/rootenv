apiVersion: v1
kind: ServiceAccount
metadata:
  name: attempt-controller
  namespace: rootenv-infra
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: attempt-controller
rules:
  - apiGroups: ["lab.rootenv.io"]
    resources: ["labenvironments"]
    verbs: ["get", "list", "watch", "create", "patch", "delete"]
  - apiGroups: ["lab.rootenv.io"]
    resources: ["labenvironments/status"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: attempt-controller
subjects:
  - kind: ServiceAccount
    name: attempt-controller
    namespace: rootenv-infra      
roleRef:
  kind: ClusterRole
  name: attempt-controller
  apiGroup: rbac.authorization.k8s.io