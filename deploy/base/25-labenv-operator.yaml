apiVersion: v1
kind: Namespace
metadata:
  name: labenv-operator-system
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: labenv-operator-controller-manager
  namespace: labenv-operator-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: labenv-operator-manager-role
rules:
- apiGroups: [""]
  resources: [namespaces, pods, services, limitranges, resourcequotas, serviceaccounts]
  verbs: [get, list, watch, create, update, patch, delete]
- apiGroups: [apps]
  resources: [deployments]
  verbs: [get, list, watch, create, update, patch, delete]
- apiGroups: [rbac.authorization.k8s.io]
  resources: [roles, rolebindings]
  verbs: [get, list, watch, create, update, patch, delete]
- apiGroups: [networking.k8s.io]
  resources: [networkpolicies]
  verbs: [get, list, watch, create, update, patch, delete]
- apiGroups: [lab.rootenv.io]
  resources: [labenvironments]
  verbs: [get, list, watch, create, update, patch, delete]
- apiGroups: [lab.rootenv.io]
  resources: [labenvironments/status]
  verbs: [get, update, patch]
- apiGroups: [lab.rootenv.io]
  resources: [labenvironments/finalizers]
  verbs: [update]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: labenv-operator-manager-rolebinding
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: labenv-operator-manager-role
subjects:
- kind: ServiceAccount
  name: labenv-operator-controller-manager
  namespace: labenv-operator-system
---
# Role for managing Traefik resources in rootenv-infra (scoped, not cluster-wide)
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: labenv-operator-traefik-role
  namespace: rootenv-infra
rules:
- apiGroups: [traefik.io]
  resources: [ingressroutes, middlewares]
  verbs: [get, list, watch, create, update, patch, delete]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: labenv-operator-traefik-rolebinding
  namespace: rootenv-infra
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: labenv-operator-traefik-role
subjects:
- kind: ServiceAccount
  name: labenv-operator-controller-manager
  namespace: labenv-operator-system
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: labenv-operator-controller-manager
  namespace: labenv-operator-system
spec:
  replicas: 1
  selector:
    matchLabels:
      app: labenv-operator
  template:
    metadata:
      labels:
        app: labenv-operator
    spec:
      serviceAccountName: labenv-operator-controller-manager
      containers:
      - name: manager
        image: labenv-operator
        imagePullPolicy: IfNotPresent
        args:
        - --health-probe-bind-address=:8081
        - --metrics-bind-address=0
        ports:
        - containerPort: 8081
          name: health
        livenessProbe:
          httpGet:
            path: /healthz
            port: 8081
          initialDelaySeconds: 15
          periodSeconds: 20
        readinessProbe:
          httpGet:
            path: /readyz
            port: 8081
          initialDelaySeconds: 5
          periodSeconds: 10
        env:
        - name: LABENV_RELAY_EXEC_IMAGE
          value: relay-exec
        resources:
          requests:
            cpu: 10m
            memory: 64Mi
          limits:
            cpu: 500m
            memory: 128Mi
