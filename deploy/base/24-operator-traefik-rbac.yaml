apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  labels:
    app.kubernetes.io/name: labenv-operator
    app.kubernetes.io/managed-by: kustomize
  name: labenv-operator-traefik-role
  namespace: rootenv-infra
rules:
- apiGroups:
  - traefik.io
  resources:
  - ingressroutes
  - middlewares
  verbs:
  - get
  - list
  - watch
  - create
  - update
  - patch
  - delete
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  labels:
    app.kubernetes.io/name: labenv-operator
    app.kubernetes.io/managed-by: kustomize
  name: labenv-operator-traefik-rolebinding
  namespace: rootenv-infra
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: labenv-operator-traefik-role
subjects:
- kind: ServiceAccount
  name: labenv-operator-controller-manager
  namespace: labenv-operator-system
