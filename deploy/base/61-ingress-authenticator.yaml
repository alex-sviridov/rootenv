apiVersion: apps/v1
kind: Deployment
metadata:
  name: ingress-authenticator
  namespace: rootenv-infra
  labels:
    app: ingress-authenticator
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ingress-authenticator
  template:
    metadata:
      labels:
        app: ingress-authenticator
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        seccompProfile:
          type: RuntimeDefault
      containers:
      - name: ingress-authenticator
        image: ingress-authenticator
        imagePullPolicy: IfNotPresent
        env:
        - name: INGAUTH_POCKETBASE_URL
          value: http://backend-svc.rootenv-infra.svc.cluster.local:8090
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop: ["ALL"]
        livenessProbe:
          httpGet:
            path: /healthz
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /readyz
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 10
        resources:
          requests:
            memory: "32Mi"
            cpu: "50m"
          limits:
            memory: "64Mi"
            cpu: "100m"
---
apiVersion: v1
kind: Service
metadata:
  name: ingress-authenticator
  namespace: rootenv-infra
spec:
  selector:
    app: ingress-authenticator
  ports:
  - port: 8080
    targetPort: 8080
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: ingress-authenticator
  namespace: rootenv-infra
spec:
  podSelector:
    matchLabels:
      app: ingress-authenticator
  policyTypes:
  - Ingress
  - Egress
  ingress:
  - from:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: kube-system
    ports:
    - protocol: TCP
      port: 8080
  egress:
  - to:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: rootenv-infra
      podSelector:
        matchLabels:
          app: backend
    ports:
    - protocol: TCP
      port: 8090
